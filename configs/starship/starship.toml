format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

[directory]
read_only = " ï ½"
truncation_symbol = 'â€¦/'

[git_branch]
format = "[$symbol$branch]($style) "
style = "bright-black"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'
style = "bright-black"
ahead = "[â‡¡$count](purple)"
behind = "[â‡£$count](red)"
diverged = "â‡¡$ahead_countâ‡£$behind_count"
staged = "[+$count](green)"
modified = "[!$count](yellow)"
untracked = "[?$count](blue)"
